spring.application.name=cocreate

spring.datasource.url=jdbc:mysql://host.docker.internal:3306/cocreate
spring.datasource.username=root
spring.datasource.password=root
# maybe comment out
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
# automatically updates our database schema so it corresponds with changes in the java entity models. So if we add a field in Post
# for example, this line will automatically sync it with our post table in the DB
spring.jpa.hibernate.ddl-auto=update

# This is supposed to enable making PATCH requests
spring.mvc.hiddenmethod.filter.enabled=true



